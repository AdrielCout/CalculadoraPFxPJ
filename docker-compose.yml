version: "3.8"

services:
  # ── Banco de Dados ────────────────────────────────────────────────
  postgres:
    image: postgres:16
    container_name: postgres16
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: minha_base
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - appnet
    # Healthcheck: o backend só sobe quando o postgres estiver realmente pronto
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d minha_base"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── pgAdmin (interface visual do banco) ───────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin4
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "8080:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - appnet

  # ── Backend (Node.js / Express) ───────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DATABASE_URL: "postgresql://admin:admin123@postgres:5432/minha_base"
    ports:
      - "5000:5000"
    # Aguarda o postgres passar no healthcheck antes de iniciar
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - appnet

  # ── Frontend (React / Vite) ───────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - appnet

volumes:
  pg_data:
  pgadmin_data:

networks:
  appnet:
